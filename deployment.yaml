
apiVersion: apps/v1
kind: Deployment
metadata:
 name: myapp
spec:
 replicas: 3
 selector:
   matchLabels:
     app: myapp
 template:
   metadata:
     labels:
       app: myapp
   spec:
     containers:
     - name: nodejs-app
       image: ak7999ks/myapp
       ports:
       - containerPort: 3000
 ---
 apiVersion: v1
kind: Service
metadata:
 name: nodejs-service
spec:
 type: NodePort
 selector:
   app: myapp
 ports:
   - port: 80
     targetPort: 3000
     nodePort: 30007
